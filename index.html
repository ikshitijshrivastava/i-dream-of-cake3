<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f0a500">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IDoCake">
<link rel="manifest" href="manifest.json">
<title>I Dream of Cake - Pro Suite</title>
<style>
/* ── EXISTING STYLES ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0f14;color:#e8eaf0;font-family:Arial,sans-serif;font-size:14px;min-height:100vh;padding-bottom:70px;}
h1,h2,.syne{font-family:Georgia,serif;}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#0d0f14 0%,#1a1040 100%);}
.login-box{background:#161920;border:1px solid #2a2f3a;border-radius:20px;padding:32px 28px;width:100%;max-width:360px;text-align:center;}
.hdr{background:#161920;border-bottom:1px solid #2a2f3a;padding:15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
.htitle{font-size:18px;font-weight:bold;}
.htitle span{color:#f0a500;}
.btn{background:#1e2229;color:#e8eaf0;border:1px solid #2a2f3a;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:bold;}
.btn-gold{background:#f0a500;color:#0d0f14;border:none;}

/* ── NEW INVENTORY STYLES ── */
.tab-container{display:none;}
.tab-container.active{display:block;}
.inv-card{background:#161920;border:1px solid #2a2f3a;border-radius:12px;padding:15px;margin:10px;}
.badge{padding:2px 6px;border-radius:4px;font-size:10px;text-transform:uppercase;font-weight:bold;}
.badge-red{background:rgba(240,101,101,0.1);color:#f06565;}
.badge-green{background:rgba(62,207,142,0.1);color:#3ecf8e;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#161920;border-top:1px solid #2a2f3a;display:flex;justify-content:space-around;padding:12px 0;z-index:1000;}
.bnav-btn{background:none;border:none;color:#7a8099;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bnav-btn.active{color:#f0a500;}
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}
.stat-box{background:#1e2229;padding:12px;border-radius:10px;text-align:center;border:1px solid #2a2f3a;}
</style>
</head>
<body>

<div id="mainApp" style="display:none;">
    <div class="hdr">
        <div class="htitle syne">I Dream of <span>Cake</span></div>
        <button class="btn btn-gold btn-sm" onclick="exportData()">Export CSV</button>
    </div>

    <div id="tab-orders" class="tab-container active">
        <div style="padding:15px;">
            <h2>Recent Orders</h2>
            <div id="orderList"></div>
            <button class="btn btn-gold" style="width:100%; margin-top:20px;" onclick="alert('Add Order feature triggered')">+ New Order</button>
        </div>
    </div>

    <div id="tab-inventory" class="tab-container">
        <div class="inv-grid">
            <div class="stat-box">
                <div style="font-size:20px;">📦</div>
                <div id="totalStock">0</div>
                <div style="font-size:10px; color:#7a8099;">Total Stock</div>
            </div>
            <div class="stat-box" onclick="showReplenishment()">
                <div style="font-size:20px;">⚠️</div>
                <div id="alertCount">0</div>
                <div style="font-size:10px; color:#7a8099;">Low Stock</div>
            </div>
        </div>

        <div style="padding:0 10px;">
            <select id="locationSelector" class="btn" style="width:100%; margin-bottom:10px;" onchange="renderInventory()">
                <option value="all">All Locations</option>
                <option value="Main Warehouse">Main Warehouse</option>
                <option value="Shop Floor">Shop Floor</option>
            </select>
            <div id="inventoryContainer"></div>
        </div>
    </div>
    
    <nav class="bnav">
        <button class="bnav-btn active" onclick="switchTab('orders', this)"><span>🛒</span>Orders</button>
        <button class="bnav-btn" onclick="switchTab('inventory', this)"><span>📦</span>Inventory</button>
        <button class="bnav-btn" onclick="openReconciliation()"><span>⚖️</span>Reconcile</button>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// 1. DATA MODELS
let inventory = [
    { id: 1, name: "Vanilla Sponge", stock: 45, location: "Main Warehouse", batch: "B-102", expiry: "2026-04-15", min: 10 },
    { id: 2, name: "Dark Chocolate", stock: 8, location: "Shop Floor", batch: "B-99", expiry: "2026-04-10", min: 15 }
];

// 2. TAB SWITCHING logic
function switchTab(tabId, el) {
    document.querySelectorAll('.tab-container').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    el.classList.add('active');
    if(tabId === 'inventory') renderInventory();
}

// 3. INVENTORY RENDERING (Multi-Location & Batch Tracking)
function renderInventory() {
    const loc = document.getElementById('locationSelector').value;
    const container = document.getElementById('inventoryContainer');
    const filtered = loc === 'all' ? inventory : inventory.filter(i => i.location === loc);
    
    container.innerHTML = filtered.map(item => `
        <div class="inv-card">
            <div style="display:flex; justify-content:space-between;">
                <strong>${item.name}</strong>
                <span class="badge ${item.stock <= item.min ? 'badge-red' : 'badge-green'}">${item.stock} Units</span>
            </div>
            <div style="font-size:12px; color:#7a8099; margin-top:8px;">
                Loc: ${item.location} | Batch: ${item.batch} | Exp: ${item.expiry}
            </div>
            ${item.stock <= item.min ? '<div style="color:#f0a500; font-size:11px; margin-top:5px;">⚠️ Replenishment Suggested</div>' : ''}
        </div>
    `).join('');
    
    document.getElementById('totalStock').innerText = inventory.reduce((a, b) => a + b.stock, 0);
    document.getElementById('alertCount').innerText = inventory.filter(i => i.stock <= i.min).length;
}

// 4. EXPORT LOGIC (CSV)
function exportData() {
    let csv = "Item,Stock,Location,Batch,Expiry\n";
    inventory.forEach(i => {
        csv += `${i.name},${i.stock},${i.location},${i.batch},${i.expiry}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Inventory_Report_${new Date().toLocaleDateString()}.csv`;
    a.click();
}

// 5. RECONCILIATION & MISMATCH LOGIC
function openReconciliation() {
    const itemName = prompt("Enter Item Name for Reconciliation:");
    const physical = prompt("Enter Physical Stock Count:");
    const item = inventory.find(i => i.name.toLowerCase() === itemName.toLowerCase());
    
    if(item) {
        const mismatch = physical - item.stock;
        if(mismatch !== 0) {
            alert(`MISMATCH DETECTED!\nDate: ${new Date().toLocaleDateString()}\nItem: ${item.name}\nSystem: ${item.stock}\nPhysical: ${physical}\nDifference: ${mismatch}`);
            item.stock = parseInt(physical);
            renderInventory();
        } else {
            alert("Stock levels are perfectly reconciled.");
        }
    } else {
        alert("Item not found.");
    }
}

// Bypass Login for Demo (Keep your actual Firebase Login logic here)
document.getElementById('mainApp').style.display = 'block';
</script>
</body>
</html>
