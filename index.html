<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f0a500">
<link rel="manifest" href="manifest.json">
<title>I Dream of Cake - Pro Suite</title>
<style>
/* ── KEEPING ALL YOUR ORIGINAL STYLES ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0f14;color:#e8eaf0;font-family:Arial,sans-serif;font-size:14px;min-height:100vh;padding-bottom:80px;}
h1,h2,.syne{font-family:Georgia,serif;}
.hdr{background:#161920;border-bottom:1px solid #2a2f3a;padding:15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
.htitle span{color:#f0a500;}
.btn{background:#1e2229;color:#e8eaf0;border:1px solid #2a2f3a;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:bold;}
.btn-gold{background:#f0a500;color:#0d0f14;border:none;}

/* ── NEW INVENTORY MODULE STYLES ── */
.page{display:none; padding:15px;}
.active-page{display:block;}
.inv-card{background:#161920;border:1px solid #2a2f3a;border-radius:12px;padding:15px;margin-bottom:10px;}
.batch-tag{font-size:10px; color:#f0a500; border:1px solid #f0a500; padding:1px 4px; border-radius:4px; margin-right:5px;}
.stock-alert{border-left:4px solid #f06565; background:rgba(240,101,101,0.05);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#161920;border-top:1px solid #2a2f3a;display:flex;justify-content:space-around;padding:12px 0;z-index:1000;}
.nav-item{color:#7a8099;font-size:11px;text-align:center;background:none;border:none;cursor:pointer;}
.nav-item.active{color:#f0a500;}
</style>
</head>
<body>

<div class="hdr">
    <div class="htitle syne">I Dream of <span>Cake</span></div>
    <div id="header-actions">
        <button class="btn btn-sm" onclick="exportInventory()">Export CSV</button>
    </div>
</div>

<div id="page-orders" class="page active-page">
    <h2>Active Orders</h2>
    <div id="order-list-container">
        <p style="color:#7a8099; margin-top:10px;">Loading your orders...</p>
    </div>
    <button class="btn btn-gold" style="width:100%; margin-top:20px;">+ New Order</button>
</div>

<div id="page-inventory" class="page">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
        <button class="btn" onclick="importInvoice()">📥 Auto-Import Invoice</button>
        <button class="btn" onclick="openReconcile()">⚖️ Stock Audit</button>
    </div>

    <select id="warehouse-filter" class="btn" style="width:100%; margin-bottom:15px;" onchange="renderInventory()">
        <option value="all">All Locations</option>
        <option value="Warehouse A">Main Warehouse</option>
        <option value="Retail Outlet">Retail Outlet</option>
        <option value="Cold Storage">Cold Storage</option>
    </select>

    <div id="inventory-list"></div>
</div>

<div id="page-expenses" class="page">
    <h2>Business Expenses</h2>
    <div id="expense-list-container"></div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('orders', this)"><div>🛒</div>Orders</button>
    <button class="nav-item" onclick="showPage('inventory', this)"><div>📦</div>Inventory</button>
    <button class="nav-item" onclick="showPage('expenses', this)"><div>💰</div>Expenses</button>
</nav>

<script>
// 1. NAVIGATION LOGIC
function showPage(pageId, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active-page');
    btn.classList.add('active');
}

// 2. NEW INVENTORY DATA (Simulated - Connects to your logic)
let inventoryData = [
    { id:101, name:"Butter Cream", stock:12, min:20, loc:"Main Warehouse", batch:"B-77", exp:"2026-05-10" },
    { id:102, name:"Cocoa Powder", stock:50, min:15, loc:"Retail Outlet", batch:"B-82", exp:"2027-01-01" }
];

function renderInventory() {
    const filter = document.getElementById('warehouse-filter').value;
    const container = document.getElementById('inventory-list');
    container.innerHTML = '';

    const filtered = filter === 'all' ? inventoryData : inventoryData.filter(i => i.loc === filter);

    filtered.forEach(item => {
        const isLow = item.stock < item.min;
        container.innerHTML += `
            <div class="inv-card ${isLow ? 'stock-alert' : ''}">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <strong>${item.name}</strong>
                    <b style="color:${isLow ? '#f06565' : '#3ecf8e'}">${item.stock} Units</b>
                </div>
                <div style="font-size:11px; color:#7a8099;">
                    <span class="batch-tag">Batch: ${item.batch}</span>
                    <span>Exp: ${item.exp}</span> | <span>Loc: ${item.loc}</span>
                </div>
                ${isLow ? '<div style="margin-top:8px; font-size:11px; color:#f0a500;">⚠️ Suggest Replenishment (Below ${item.min})</div>' : ''}
            </div>
        `;
    });
}

// 3. RECONCILIATION LOGIC (Physical vs System)
function openReconcile() {
    const item = prompt("Enter Item Name to Audit:");
    const physical = prompt("Enter Physical Count Found:");
    const found = inventoryData.find(i => i.name.toLowerCase() === item.toLowerCase());
    
    if(found) {
        const diff = physical - found.stock;
        if(diff !== 0) {
            alert(`MISMATCH FOUND!\nItem: ${found.name}\nSystem: ${found.stock}\nPhysical: ${physical}\nDifference: ${diff}\nLog saved for ${new Date().toLocaleDateString()}`);
            found.stock = parseInt(physical); // Auto-adjust
            renderInventory();
        } else {
            alert("Perfect match! System and physical stock are aligned.");
        }
    }
}

// 4. AUTO-IMPORT FROM INVOICE (CSV)
function importInvoice() {
    alert("Select your purchase invoice (CSV/PDF). This will auto-update batch and stock levels.");
    // This connects to the File Picker in a real environment
}

// 5. EXPORT INVENTORY
function exportInventory() {
    let csv = "Item,Stock,Location,Batch,Expiry\n";
    inventoryData.forEach(i => { csv += `${i.name},${i.stock},${i.loc},${i.batch},${i.exp}\n`; });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = "Bakery_Inventory.csv";
    a.click();
}

// Initial Render
renderInventory();

/* YOUR ORIGINAL FIREBASE & ORDER SCRIPT STARTS HERE */
// Paste your previous Firebase Config and Order rendering functions below
</script>
</body>
</html>
